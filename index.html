<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a1128" />
    <title>鮫海博物館</title>
    <meta name="description" content="海の捕食者を、正しく、深く、美しく知る。" />
    <style>
      :root{--color-black-blue:#0a1128;--color-abyss-navy:#001f3f;--color-bone-white:#f8f9fa;--color-steel-gray:#4a5a6a;--color-danger-red:#ff4136;--color-cyan-highlight:#00f2fe;--font-sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--font-serif:"Hiragino Mincho ProN","Yu Mincho",serif;--nav-height:88px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--color-black-blue);color:var(--color-bone-white);font-family:var(--font-sans);line-height:1.6;overflow-x:hidden}.navigation{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:1.25rem 0;background:rgba(10,17,40,.82);box-shadow:0 10px 30px rgba(0,0,0,.18)}.nav-container{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;min-height:48px}.nav-logo{font-family:var(--font-serif);font-size:1.5rem;font-weight:700;color:var(--color-bone-white);text-decoration:none;white-space:nowrap}.nav-desktop{display:flex;align-items:center;gap:1.25rem}.nav-links{display:flex;align-items:center;gap:1rem;list-style:none}.nav-links a{color:var(--color-bone-white);font-size:.9rem;text-decoration:none;white-space:nowrap}.btn-primary{display:inline-block;background:var(--color-danger-red);color:var(--color-bone-white);padding:1rem 2.5rem;border-radius:4px;font-weight:700;text-decoration:none}.nav-cta{padding:.6rem 1.5rem;font-size:.9rem}.hero-container{height:100vh;height:100svh;width:100%;position:relative;overflow:hidden;background:var(--color-abyss-navy);display:flex;align-items:center;justify-content:center;padding:var(--nav-height) 1.5rem 3rem}.ocean-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,#003366 0%,var(--color-black-blue) 70%);z-index:1}.hero-content{position:relative;z-index:10;text-align:center;width:min(100%,800px);color:var(--color-bone-white)}.hero-title{font-family:var(--font-serif);font-size:4.5rem;line-height:1.2;margin-bottom:2rem;text-shadow:0 10px 30px rgba(0,0,0,.8)}.hero-subtitle{font-size:1.2rem;color:var(--color-steel-gray);margin:0 auto 4rem;line-height:1.8;max-width:600px}.shark-wrapper{position:absolute;width:100vw;height:100vh;z-index:2;opacity:.15;pointer-events:none}@media (max-width:1180px){.nav-desktop{display:none}}@media (max-width:768px){:root{--nav-height:80px}.navigation{padding:1rem 0;background:rgba(10,17,40,.96)}.nav-container{padding:0 1.25rem}.nav-logo{font-size:1.25rem}.hero-container{height:auto;min-height:100vh;min-height:100svh;padding:calc(var(--nav-height) + 1rem) 1rem 2.5rem}.ocean-bg{background:linear-gradient(180deg,#002b55 0%,var(--color-black-blue) 74%)}.hero-title{font-size:2.4rem;margin-bottom:1.5rem}.hero-subtitle{font-size:1rem;margin-bottom:2.5rem}.shark-wrapper{opacity:.1}}@media (max-width:380px){.hero-title{font-size:2.1rem}}
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;700;800&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root">
      <div class="app-container">
        <header class="navigation">
          <div class="nav-container">
            <a href="/" class="nav-logo">鮫海博物館</a>
            <nav class="nav-desktop">
              <ul class="nav-links">
                <li><a href="/about">私たちについて</a></li>
                <li><a href="/species">サメ図鑑</a></li>
                <li><a href="/exhibits">展示案内</a></li>
                <li><a href="/conservation">保全と研究</a></li>
                <li><a href="/visit">来館ガイド</a></li>
                <li><a href="/contact">お問い合わせ</a></li>
              </ul>
              <a href="/exhibits" class="btn-primary nav-cta">展示を見る</a>
            </nav>
          </div>
        </header>
        <main class="main-content">
          <div class="home-page">
            <div class="hero-container">
              <div class="ocean-bg"></div>
              <div class="shark-wrapper"></div>
              <div class="hero-content">
                <h1 class="hero-title">「海の支配者を、<br />もっと正確に知る。」</h1>
                <p class="hero-subtitle">鮫海博物館は、サメの多様な種、生態、進化、行動、保全を学べる架空の海洋教育ミュージアムです。恐怖だけではない、海の捕食者の本当の姿を紹介します。</p>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
